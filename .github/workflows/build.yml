name: Build iOS IPA

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    # We keep Expo CLI only to generate the 'ios' folder since you don't have it in your repo
    - name: Generate iOS Folder (Prebuild)
      run: npx expo prebuild --platform ios --template blank

    - name: Install CocoaPods
      run: |
        cd ios
        pod install

    - name: Build iOS (Unsigned for AltStore)
      run: |
        cd ios
        xcodebuild \
          -workspace *.xcworkspace \
          -scheme main \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          AD_HOC_CODE_SIGNING_ALLOWED=YES \
          -derivedDataPath ./build

    - name: Package IPA
      run: |
        mkdir -p Payload
        cp -r ios/build/Build/Products/Release-iphoneos/*.app Payload/
        zip -r ProjectF56.ipa Payload/

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: ProjectF56-IPA
        path: ProjectF56.ipa
