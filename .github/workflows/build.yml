name: Build iOS IPA

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        npm install
        npm install -g cocoapods

    - name: Generate iOS Folder (Prebuild)
      run: npx expo prebuild --platform ios --no-install

    - name: Install CocoaPods
      run: |
        cd ios
        # Clear the specific boost cache that was failing
        pod cache clean 'boost'
        pod repo update
        # Force a retry if the download fails
        pod install || pod install || pod install

    - name: Build iOS (Unsigned)
      run: |
        cd ios
        xcodebuild \
          -workspace *.xcworkspace \
          -scheme main \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          AD_HOC_CODE_SIGNING_ALLOWED=YES \
          -derivedDataPath ./build

    - name: Package IPA
      run: |
        mkdir -p Payload
        cp -r ios/build/Build/Products/Release-iphoneos/*.app Payload/
        zip -r ProjectF56.ipa Payload/

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: ProjectF56-IPA
        path: ProjectF56.ipa
