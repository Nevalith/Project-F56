name: Build iOS IPA

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
        bundler-cache: true

    - name: Install CocoaPods
      run: sudo gem install cocoapods

    - name: Generate iOS project
      run: |
        npx react-native init ProjectF56 --version 0.73.4 --skip-install --directory rn_temp
        cp -r rn_temp/ios ./ios
        rm -rf rn_temp
        cp ios/ProjectF56/Info.plist ios/ProjectF56/Info.plist.bak || true

    - name: Install pods
      run: |
        cd ios
        pod install

    - name: Build iOS
      run: |
        cd ios
        xcodebuild \
          -workspace ProjectF56.xcworkspace \
          -scheme ProjectF56 \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          IPHONEOS_DEPLOYMENT_TARGET=16.0 \
          -derivedDataPath ./build \
          build

    - name: Package IPA
      run: |
        APP_PATH=$(find ios/build -name "ProjectF56.app" -type d | head -1)
        echo "App found at: $APP_PATH"
        mkdir -p Payload
        cp -r "$APP_PATH" Payload/
        zip -r ProjectF56.ipa Payload/
        ls -lh ProjectF56.ipa

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: ProjectF56-IPA
        path: ProjectF56.ipa
        retention-days: 7
