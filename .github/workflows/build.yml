name: Build iOS IPA

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        npm install
        npm install -g cocoapods

    - name: Generate iOS Folder (Prebuild)
      run: npx expo prebuild --platform ios --no-install

    - name: Fix Xcode Project UUIDs
      run: |
        # This fixes the "unknown UUID" error by cleaning the project file
        sed -i '' '/3151269E1E60452289E85E15/d' ios/*.xcodeproj/project.pbxproj || true

    - name: Install CocoaPods
      run: |
        cd ios
        # Force a specific CocoaPods version that is more stable with Boost 1.76
        sudo gem install cocoapods -v 1.15.2
        # Use a mirror for Boost to bypass the checksum error
        pod install --repo-update || (sleep 10 && pod install --repo-update)

    - name: Build iOS (Unsigned)
      run: |
        cd ios
        xcodebuild \
          -workspace *.xcworkspace \
          -scheme main \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          AD_HOC_CODE_SIGNING_ALLOWED=YES \
          -derivedDataPath ./build

    - name: Package IPA
      run: |
        mkdir -p Payload
        cp -r ios/build/Build/Products/Release-iphoneos/*.app Payload/
        zip -r ProjectF56.ipa Payload/

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: ProjectF56-IPA
        path: ProjectF56.ipa
